<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Center - TravelLink</title>
    <link rel="stylesheet" href="sty.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="header-logo">
                <img src="the_logo.png" alt="TravelLink Logo" class="logo-image">
                <span class="logo-text">TravelLink</span>
            </div>
            
            <nav class="nav-menu">
                <a href="sidaedit.html" class="nav-link">HOME</a>
                <a href="inspiration.html" class="nav-link">INSPIRATION</a>
                <a href="h.html" class="nav-link active">HELP CENTER</a>
                <a href="#" class="nav-link">ABOUT</a>
            </nav>
            
            <button class="user-button">
                <i data-lucide="user"></i>
            </button>
        </div>
    </header>

    <div class="help-hero">
        <h1 class="hero-title">Contact Us</h1>
    </div>

    <div class="help-content">
        <div class="glass-card">
            <form class="contact-form" id="contactForm">
                <div class="form-row">
                    <div class="form-group">
                        <input type="text" class="form-input" id="userName" placeholder="Name *" required>
                    </div>
                    <div class="form-group">
                        <input type="email" class="form-input" id="userEmail" placeholder="Email *" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <input type="text" class="form-input" id="messageSubject" placeholder="Subject *" required>
                </div>
                
                <div class="form-group">
                    <textarea class="form-textarea" id="messageText" rows="6" placeholder="Your message *" required></textarea>
                </div>
                
                <button type="submit" class="submit-button">
                    <span>Send Message</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>
        </div>

        <div class="contact-options">
            <div class="option-item">
                <i data-lucide="mail"></i>
                <span>email</span>
            </div>
            <div class="option-item">
                <i data-lucide="phone"></i>
                <span>nummer</span>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
